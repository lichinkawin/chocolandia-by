<!DOCTYPE html>
<html lang="ru" class="h-full antialiased">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Корзина — Chocolandia.by</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/main.css" />
    <script>
      window.__CHOCOLANDIA_CONFIG__ = { formspreeUrl: "https://formspree.io/f/REPLACE_ME" };
    </script>
  </head>
  <body class="min-h-full flex flex-col bg-background text-foreground">
    <div id="site-nav"></div>
    <main class="mx-auto flex w-full flex-1 max-w-screen-2xl flex-col gap-12 bg-background px-4 pb-24 pt-[88px] sm:px-6 sm:pb-16 sm:pt-[96px] lg:px-12">
      <section class="space-y-3">
        <p class="text-xs font-bold uppercase tracking-[0.3em] text-accent">Корзина</p>
        <h1 class="font-serif text-4xl text-primary-cocoa sm:text-5xl">Ваш заказ</h1>
        <p class="text-sm text-foreground-muted">Проверьте состав и заполните данные для оформления.</p>
      </section>
      <section class="grid gap-10 lg:grid-cols-[1.15fr,0.85fr] lg:gap-12">
        <div id="cart-list-root" class="space-y-4 rounded-xl bg-card p-6 shadow-[0_16px_48px_-24px_rgba(39,19,16,0.18)]"></div>
        <aside class="h-fit space-y-6 rounded-xl border border-outline-variant/25 bg-muted-low/80 p-6 lg:sticky lg:top-28">
          <h2 class="font-serif text-2xl text-primary-cocoa">Оформление</h2>
          <div class="space-y-2 text-sm">
            <p class="flex items-center justify-between">
              <span class="text-foreground-muted">Сумма</span>
              <strong id="cart-subtotal" class="font-serif text-lg">0 BYN</strong>
            </p>
            <p class="text-foreground-muted">Доставка: уточняется с менеджером</p>
          </div>
          <form id="checkout-form" class="grid gap-4 sm:grid-cols-2">
            <label class="flex flex-col gap-1.5 text-sm sm:col-span-1">
              <span class="text-foreground/80">Имя</span>
              <input name="name" required class="rounded-lg border border-border bg-background px-3 py-2 outline-none transition focus:border-accent" placeholder="Анна" />
            </label>
            <label class="flex flex-col gap-1.5 text-sm sm:col-span-1">
              <span class="text-foreground/80">Телефон (+375...)</span>
              <input name="phone" required value="+375" class="rounded-lg border border-border bg-background px-3 py-2 outline-none transition focus:border-accent" placeholder="+375291112233" />
            </label>
            <label class="flex flex-col gap-1.5 text-sm sm:col-span-2">
              <span class="text-foreground/80">Адрес доставки</span>
              <input name="address" required class="rounded-lg border border-border bg-background px-3 py-2 outline-none transition focus:border-accent" placeholder="г. Минск, ул. Примерная, 10-12" />
            </label>
            <label class="flex flex-col gap-1.5 text-sm sm:col-span-2">
              <span class="text-foreground/80">Комментарий</span>
              <textarea name="comment" rows="4" class="resize-none rounded-lg border border-border bg-background px-3 py-2 outline-none transition focus:border-accent" placeholder="Удобное время доставки..."></textarea>
            </label>
            <div class="sm:col-span-2 flex flex-col gap-3 rounded-lg border border-border bg-muted/50 p-4">
              <p id="checkout-status" class="text-sm"></p>
              <button type="submit" class="w-full rounded-lg bg-accent px-4 py-2.5 text-sm font-medium text-white transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-50 sm:w-fit">Отправить заказ</button>
            </div>
          </form>
        </aside>
      </section>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="assets/js/pages/cart.js"></script>
  </body>
</html>
